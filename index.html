<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1A1A2E">
<title>SHED — Weight Loss Tracker</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.4/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--ember:#FF6B35;--flame:#FF9F1C;--coal:#12121F;--smoke:#16213E;--ash:#0F3460;--glow:#E94560;--bone:#EDEDED;--success:#2ECC71;--premium:#FFD700}
html,body,#root{height:100%;width:100%}
body{font-family:'Sora',sans-serif;background:var(--coal);color:var(--bone);overflow-x:hidden;-webkit-font-smoothing:antialiased}
.serif{font-family:'DM Serif Display',serif}
@keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes glow{0%,100%{box-shadow:0 0 20px rgba(255,107,53,0.3)}50%{box-shadow:0 0 40px rgba(255,107,53,0.6)}}
@keyframes burn{0%{background-position:0% 50%}50%{background-position:100% 50%}100%{background-position:0% 50%}}
@keyframes dotPulse{0%,80%,100%{transform:scale(.6);opacity:.4}40%{transform:scale(1);opacity:1}}
.au{animation:fadeUp .6s ease-out forwards}
.ag{animation:glow 2s ease-in-out infinite}
.aburn{background:linear-gradient(270deg,var(--ember),var(--flame),var(--glow),var(--ember));background-size:400% 400%;animation:burn 4s ease infinite}
.bp{background:linear-gradient(135deg,var(--ember),var(--flame));color:#fff;border:none;padding:14px 32px;border-radius:14px;font-family:'Sora';font-weight:600;font-size:15px;cursor:pointer;width:100%;transition:all .3s}
.bp:disabled{opacity:.4;cursor:default}
.bs{background:rgba(255,255,255,.06);color:var(--bone);border:1px solid rgba(255,255,255,.12);padding:14px 32px;border-radius:14px;font-family:'Sora';font-weight:500;font-size:15px;cursor:pointer;width:100%}
.inf{width:100%;padding:14px 18px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.1);border-radius:12px;color:#fff;font-family:'Sora';font-size:15px;outline:none;transition:border .3s}
.inf:focus{border-color:var(--ember);box-shadow:0 0 0 3px rgba(255,107,53,.15)}
.inf::placeholder{color:rgba(255,255,255,.35)}
textarea.inf{resize:vertical}
select.inf{appearance:none}
.cd{background:linear-gradient(145deg,rgba(255,255,255,.04),rgba(255,255,255,.01));border:1px solid rgba(255,255,255,.06);border-radius:20px;padding:24px;transition:all .3s;color:#EDEDED}
.tg{display:inline-block;padding:6px 14px;border-radius:100px;font-size:12px;font-weight:500}
.sbtn{width:56px;height:56px;border-radius:16px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);color:var(--bone);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-family:'Sora';user-select:none}
.noscroll::-webkit-scrollbar{display:none}.noscroll{-ms-overflow-style:none;scrollbar-width:none}
@supports(padding-top:env(safe-area-inset-top)){body{padding-top:env(safe-area-inset-top);padding-bottom:env(safe-area-inset-bottom)}}
</style>
</head>
<body>
<div id="root"></div>
<script id="app-code" type="text/babel" data-type="module">
// ─── Use React globals ───
function nn(a,b){return a!=null&&a!==undefined?a:b}
const { useState, useEffect, useRef, useCallback } = React;

// ─── STORAGE ───
const DB = {
  s(k,v){ try{ localStorage.setItem('sh_'+k, JSON.stringify(v)) }catch(e){} },
  l(k,d){ try{ const v=localStorage.getItem('sh_'+k); return v?JSON.parse(v):d }catch(e){return d} },
  c(){ Object.keys(localStorage).filter(k=>k.startsWith('sh_')).forEach(k=>localStorage.removeItem(k)) }
};

// ─── SVG Icon helper ───
function Ic({d, s=24, c="currentColor", f=false}){
  return <svg width={s} height={s} viewBox="0 0 24 24" fill={f?c:"none"} stroke={f?"none":c} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" dangerouslySetInnerHTML={{__html:d}} />;
}
const P = {
  flame: '<path d="M8.5 14.5A2.5 2.5 0 0011 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 11-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 002.5 2.5z"/>',
  scale: '<path d="M16 3h5v5M4 20L21 3M21 16v5h-5M15 15l6 6M4 4l5 5"/>',
  target: '<circle cx="12" cy="12" r="10"/><circle cx="12" cy="12" r="6"/><circle cx="12" cy="12" r="2"/>',
  chart: '<path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.2-2.8-2.7L7 14.3"/>',
  food: '<path d="M18 8h1a4 4 0 010 8h-1M2 8h16v9a4 4 0 01-4 4H6a4 4 0 01-4-4V8zM6 1v3M10 1v3M14 1v3"/>',
  bolt: '<polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/>',
  trophy: '<path d="M6 9H4.5a2.5 2.5 0 010-5H6M18 9h1.5a2.5 2.5 0 000-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20 17 22M18 2H6v7a6 6 0 1012 0V2z"/>',
  home: '<path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/>',
  user: '<path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/>',
  bell: '<path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/>',
  send: '<line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>',
  crown: '<path d="M2 4l3 12h14l3-12-6 7-4-7-4 7-6-7z"/><path d="M3 20h18"/>',
  x: '<line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>',
  back: '<line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/>',
  water: '<path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/>',
  moon: '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>',
  sparkle: '<path d="M12 2L13.5 8.5L20 10L13.5 11.5L12 18L10.5 11.5L4 10L10.5 8.5L12 2Z"/><path d="M19 15L19.75 17.25L22 18L19.75 18.75L19 21L18.25 18.75L16 18L18.25 17.25L19 15Z" opacity="0.6"/>',
  edit: '<path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/>',
  ruler: '<path d="M21.3 15.3a2.4 2.4 0 010 3.4l-2.6 2.6a2.4 2.4 0 01-3.4 0L2.7 8.7a2.4 2.4 0 010-3.4l2.6-2.6a2.4 2.4 0 013.4 0z"/>',
  note: '<path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/>',
};

// ─── AI ───
const AI = {
  // Build rich context snapshot from all user data
  buildContext(pro, dl, fl, wh, meas, notes, streak){
    const cw=parseFloat(pro.currentWeight)||0, gw=parseFloat(pro.goalWeight)||0;
    const lost=wh.length>1?Math.round((wh[0]-wh[wh.length-1])*10)/10:0;
    const pct=wh.length>1&&gw?Math.min(100,Math.max(0,Math.round(((wh[0]-wh[wh.length-1])/(wh[0]-gw))*100))):0;
    const bmi=pro.height?Math.round(cw/Math.pow(parseFloat(pro.height)/100,2)*10)/10:null;
    const lastWeighs=wh.slice(-7).map((w,i)=>w+(i<wh.length-1?'':'(latest)')).join(', ');
    const tdee=Math.round((pro.activityLevel==='sedentary'?1.2:pro.activityLevel==='light'?1.375:pro.activityLevel==='moderate'?1.55:1.725)*(10*cw+6.25*(parseFloat(pro.height)||170)-5*35+5));
    const deficit=Math.round(tdee*0.75);

    let ctx='## USER PROFILE\n';
    ctx+='Name: '+pro.name+'\n';
    ctx+='Current weight: '+cw+pro.unit+' | Goal: '+gw+pro.unit+' | To lose: '+Math.abs(cw-gw).toFixed(1)+pro.unit+'\n';
    ctx+='Height: '+(pro.height||'?')+pro.heightUnit+' | BMI: '+(bmi||'?')+'\n';
    ctx+='Activity level: '+pro.activityLevel+'\n';
    ctx+='Estimated TDEE: ~'+tdee+' cal/day | Suggested deficit target: ~'+deficit+' cal/day\n';
    ctx+='Total lost so far: '+Math.abs(lost)+pro.unit+' ('+pct+'% to goal)\n';
    ctx+='Current streak: '+streak+' days\n';
    ctx+='Motivation: '+(pro.motivation||'not specified')+'\n';
    if(lastWeighs) ctx+='Recent weigh-ins: '+lastWeighs+'\n';

    ctx+='\n## TODAY\'S LOG ('+new Date().toLocaleDateString('en-SG',{weekday:'long',month:'short',day:'numeric'})+')\n';
    ctx+='Water: '+dl.water+'/8 glasses\n';
    ctx+='Calories consumed: '+dl.calories+' kcal'+(deficit?' (target: ~'+deficit+')':'')+'\n';
    ctx+='Steps: '+dl.steps.toLocaleString()+'/10,000\n';
    ctx+='Sleep: '+dl.sleep+' hours\n';
    ctx+='Exercise calories burned: '+dl.exercise+' kcal\n';

    if(fl.length>0){
      ctx+='\n## FOOD LOG TODAY\n';
      fl.forEach(function(f,i){ctx+=(i+1)+'. '+f.name+' — '+f.calories+'cal (P:'+f.protein+' C:'+f.carbs+' F:'+f.fat+')\n'});
    }

    if(meas&&(meas.waist||meas.chest||meas.hips)){
      ctx+='\n## BODY MEASUREMENTS\n';
      if(meas.waist)ctx+='Waist: '+meas.waist+'cm | ';
      if(meas.chest)ctx+='Chest: '+meas.chest+'cm | ';
      if(meas.hips)ctx+='Hips: '+meas.hips+'cm | ';
      if(meas.arms)ctx+='Arms: '+meas.arms+'cm | ';
      if(meas.thighs)ctx+='Thighs: '+meas.thighs+'cm';
      ctx+='\n';
    }

    if(notes) ctx+='\n## USER\'S DAILY NOTES\n"'+notes+'"\n';

    return ctx;
  },

  // The master system prompt that makes Blaze world-class
  systemPrompt(ctx){
    return 'You are Blaze, an elite AI weight loss coach inside the SHED app. You are warm but direct, evidence-based, and deeply personal. You are the kind of coach people pay $200/hour for.\n\n'+
    '## YOUR COACHING PHILOSOPHY\n'+
    '- Weight loss is a SYSTEM, not willpower. Build sustainable habits.\n'+
    '- Track patterns, not just numbers. Connect sleep, stress, food, and weight.\n'+
    '- Celebrate small wins genuinely. A 0.1kg loss IS progress.\n'+
    '- Never shame. Reframe setbacks as data points, not failures.\n'+
    '- Be specific and actionable. Never give vague advice like "eat healthier."\n'+
    '- When giving calorie/nutrition advice, use their TDEE and actual food log data.\n'+
    '- Proactively notice things in their data (low water, skipped meals, sleep deficit, etc.)\n\n'+
    '## YOUR KNOWLEDGE\n'+
    '- You understand Singapore food culture deeply: hawker centres, kopitiams, zi char, mixed rice, mala, bubble tea, kaya toast, prata, nasi lemak, chicken rice, laksa, ban mian, etc.\n'+
    '- You can estimate calories for local SG foods accurately.\n'+
    '- You know that SG portions and food environments present unique challenges.\n'+
    '- You understand the tropical climate (hydration needs are higher).\n'+
    '- You are trained in evidence-based nutrition science, CICO, macros, metabolic adaptation, and behavioral psychology.\n'+
    '- You understand that aggressive deficits lead to muscle loss and metabolic adaptation. A 500-750 cal deficit is ideal for sustainable loss.\n\n'+
    '## RESPONSE STYLE\n'+
    '- Keep responses conversational and warm, 2-5 sentences usually.\n'+
    '- Use their name naturally (not every message).\n'+
    '- Give ONE clear action item when possible.\n'+
    '- Reference their actual data when possible.\n'+
    '- Ask follow-up questions to understand their situation better.\n'+
    '- Use emojis sparingly and naturally, not excessively.\n'+
    '- If they share a struggle, validate first, then strategize.\n'+
    '- If they share a win, celebrate genuinely, then build momentum.\n'+
    '- Give specific SG-friendly food swaps when discussing nutrition (e.g. "swap the char kway teow for a thunder tea rice — similar satisfaction, half the calories")\n'+
    '- When they ask about meals, consider what is practical and available in Singapore.\n\n'+
    '## PROACTIVE COACHING\n'+
    '- If water intake is low, mention it naturally.\n'+
    '- If calories seem too low (<1200) or too high, flag it gently.\n'+
    '- If sleep is under 6 hours, connect it to weight loss (cortisol, hunger hormones).\n'+
    '- If there is no exercise logged, suggest something achievable.\n'+
    '- If the person seems discouraged, shift focus to non-scale victories.\n'+
    '- Track their weekly patterns and give end-of-day summaries when asked.\n\n'+
    '## CURRENT USER DATA\n'+ctx+
    '\n## IMPORTANT\n'+
    '- Be their thinking partner, not just an answer machine.\n'+
    '- Every response should make them feel seen, understood, and capable.\n'+
    '- You are not a doctor. For medical concerns, recommend they see one.\n'+
    '- Never recommend extreme diets, diet pills, or <1200 cal/day.\n'+
    '- Adapt your tone to theirs — if they are casual, be casual. If serious, match it.';
  },

  async callWithHistory(systemPrompt, messages){
    try {
      const apiMsgs = messages.map(function(m){return {role:m.r==='u'?'user':'assistant',content:m.t}});
      const r = await fetch('/api/ai',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({system:systemPrompt, messages:apiMsgs})
      });
      if(!r.ok){console.error('AI API error:',r.status);return null;}
      const d = await r.json();
      return d&&d.content&&d.content[0]&&d.content[0].text?d.content[0].text:null;
    } catch(e){console.error('AI call failed:',e);return null;}
  },

  async call(prompt){
    try {
      const r = await fetch('/api/ai',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({messages:[{role:'user',content:prompt}]})});
      if(!r.ok){console.error('AI API error:',r.status,await r.text());return null;}
      const d = await r.json();
      return d&&d.content&&d.content[0]&&d.content[0].text?d.content[0].text:null;
    } catch(e){console.error('AI call failed:',e);return null;}
  },

  async motivation(ctx){
    return await this.call('You are Blaze, elite weight loss coach. Based on this data:\n\n'+ctx+'\n\nGive a personalized, specific motivational message in 2-3 sentences. Reference their actual numbers. Make them feel seen and fired up. If there is something to celebrate (streak, weight lost, good food choices), call it out. If there is something to improve (low water, no exercise), weave it in encouragingly. Be warm and real, not cheesy.')||'Every day you show up is a day you win. Let\'s make today count. 🔥';
  },

  async meal(cals,prefs,ctx){
    const t=await this.call('You are a nutritionist in Singapore. Based on this user data:\n\n'+ctx+'\n\nSuggest a meal under '+cals+' cal'+(prefs?', preferences: '+prefs:'')+'. Prioritize meals easily available in Singapore (hawker, home-cooked, or grab-and-go). Return ONLY JSON: {"name":"Name","calories":0,"protein":"0g","carbs":"0g","fat":"0g","description":"Why this meal works for them specifically.","ingredients":["a","b"]}');
    try{return JSON.parse((t||'').replace(/```json|```/g,'').trim())}catch{return{name:"Thunder Tea Rice",calories:380,protein:"18g",carbs:"52g",fat:"8g",description:"High fiber, low fat, packed with nutrients.",ingredients:["rice","vegetables","tofu","tea paste"]}}
  },

  async workout(level,dur,ctx){
    const t=await this.call('You are a personal trainer. User data:\n\n'+ctx+'\n\nCreate a '+dur+'-min '+level+' fat-burning workout suitable for someone at their current weight. Exercises should be joint-friendly and doable at home or in a small space. Return ONLY JSON: {"name":"Name","duration":'+dur+',"calories_est":0,"exercises":[{"name":"Ex","reps":"12 reps or 30 sec","rest":"30 sec"}]} Include 4-6 exercises. Be specific with form cues in the exercise name if needed.');
    try{return JSON.parse((t||'').replace(/```json|```/g,'').trim())}catch{return{name:"Home Fat Blast",duration:dur,calories_est:200,exercises:[{name:"March in Place (knees high)",reps:"60 sec",rest:"15 sec"},{name:"Wall Push-ups",reps:"12 reps",rest:"30 sec"},{name:"Chair Squats (sit to stand)",reps:"12 reps",rest:"30 sec"},{name:"Standing Side Bends",reps:"15 each side",rest:"20 sec"},{name:"Plank (or knee plank)",reps:"30 sec",rest:"30 sec"}]}}
  },

  async analyzeMeal(desc,ctx){
    const t=await this.call('You are a Singapore-based nutritionist. Estimate nutrition for: "'+desc+'". Consider typical Singapore portions and preparation methods. If it is a local dish, use accurate local portion data. Return ONLY JSON: {"name":"'+desc+'","calories":0,"protein":"0g","carbs":"0g","fat":"0g"}');
    try{return JSON.parse((t||'').replace(/```json|```/g,'').trim())}catch{return{name:desc,calories:300,protein:"15g",carbs:"30g",fat:"10g"}}
  }
};

// ─── Small Components ───
function MiniChart({data, width=260, height=80, color="var(--ember)"}){
  if(!data||data.length<2) return null;
  const mn=Math.min(...data)-2, mx=Math.max(...data)+2, rng=mx-mn||1;
  const pts=data.map((v,i)=> (i/(data.length-1))*width+','+(height-((v-mn)/rng)*height) ).join(' ');
  const gid='g'+Math.random().toString(36).slice(2,6);
  return (
    <svg width="100%" viewBox={'0 0 '+width+' '+height} preserveAspectRatio="none" style={{overflow:'visible'}}>
      <defs><linearGradient id={gid} x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stopColor={color} stopOpacity="0.3"/><stop offset="100%" stopColor={color} stopOpacity="0"/></linearGradient></defs>
      <polygon points={'0,'+height+' '+pts+' '+width+','+height} fill={'url(#'+gid+')'}/>
      <polyline points={pts} fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
      <circle cx={width} cy={height-((data[data.length-1]-mn)/rng)*height} r="4" fill={color}/>
    </svg>
  );
}

function ProgressRing({progress, size=120, stroke=8, color="var(--ember)"}){
  const r=(size-stroke)/2, c=2*Math.PI*r, o=c-(Math.min(progress,100)/100)*c;
  return (
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={c} strokeDashoffset={o} strokeLinecap="round" style={{transition:'stroke-dashoffset 1s ease'}}/>
    </svg>
  );
}

function Toast({msg, onClose}){
  useEffect(()=>{const t=setTimeout(onClose,3000);return()=>clearTimeout(t)},[]);
  return <div style={{position:'fixed',top:20,left:'50%',transform:'translateX(-50%)',zIndex:9999,padding:'14px 28px',borderRadius:14,fontSize:14,fontWeight:500,animation:'fadeUp .4s',background:'linear-gradient(135deg,var(--ember),var(--flame))',color:'#fff',fontFamily:"'Sora'"}}>{msg}</div>;
}

function Sheet({open, onClose, title, children}){
  if(!open) return null;
  return (
    <div style={{position:'fixed',inset:0,zIndex:200,display:'flex',alignItems:'flex-end',justifyContent:'center'}}>
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)'}} onClick={onClose}/>
      <div style={{position:'relative',width:'100%',maxWidth:480,background:'var(--smoke)',borderRadius:'24px 24px 0 0',padding:'28px 24px 36px',animation:'fadeUp .35s',maxHeight:'85vh',overflowY:'auto'}}>
        <div style={{width:40,height:4,borderRadius:2,background:'rgba(255,255,255,.15)',margin:'0 auto 20px'}}/>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:20}}>
          {title && <h3 style={{fontSize:18,fontWeight:700}}>{title}</h3>}
          <button onClick={onClose} style={{background:'none',border:'none',cursor:'pointer',color:'var(--bone)',marginLeft:'auto'}}><Ic d={P.x} s={20}/></button>
        </div>
        {children}
      </div>
    </div>
  );
}

// ─── MAIN APP ───
function App(){
  const hasProfile = DB.l('profile',null) && DB.l('profile',{}).name;
  const [scr, setScr] = useState(hasProfile ? 'dash' : 'splash');
  const [toast, setToast] = useState(null);
  const [notifs, setNotifs] = useState(false);
  const [ob, setOb] = useState(0);
  const [pro, setPro] = useState(()=>DB.l('profile',{name:'',currentWeight:'',goalWeight:'',unit:'kg',height:'',heightUnit:'cm',activityLevel:'moderate',motivation:''}));
  const [wh, setWh] = useState(()=>DB.l('wh',[]));
  const [dl, setDl] = useState(()=>{
    const today=new Date().toDateString(), saved=DB.l('dl',null);
    return saved&&saved._d===today ? saved : {water:0,calories:0,steps:0,sleep:0,exercise:0,_d:today};
  });
  const [fl, setFl] = useState(()=>DB.l('fl',[]));
  const [meas, setMeas] = useState(()=>DB.l('meas',{waist:'',chest:'',hips:'',arms:'',thighs:''}));
  const [streak] = useState(()=>DB.l('streak',1));
  const [notes, setNotes] = useState(()=>DB.l('notes',''));
  const [mot, setMot] = useState('');
  const [motL, setMotL] = useState(false);
  const [mealS, setMealS] = useState(null);
  const [mealL, setMealL] = useState(false);
  const [wk, setWk] = useState(null);
  const [wkL, setWkL] = useState(false);
  const [msgs, setMsgs] = useState(()=>DB.l('msgs',[]));
  const ciRef = useRef(null);
  const [ciBtn, setCiBtn] = useState(false);
  const [cL, setCL] = useState(false);
  const [md, setMd] = useState(null);
  const [mi, setMi] = useState({});
  const [afL, setAfL] = useState(false);
  const chatEnd = useRef(null);

  // persist
  useEffect(()=>{if(pro.name)DB.s('profile',pro)},[pro]);
  useEffect(()=>{if(wh.length)DB.s('wh',wh)},[wh]);
  useEffect(()=>{DB.s('dl',dl)},[dl]);
  useEffect(()=>{DB.s('fl',fl)},[fl]);
  useEffect(()=>{DB.s('meas',meas)},[meas]);
  useEffect(()=>{DB.s('notes',notes)},[notes]);
  useEffect(()=>{DB.s('msgs',msgs)},[msgs]);

  const go = useCallback(s=>setScr(s),[]);
  const tt = m=>setToast(m);

  useEffect(()=>{if(scr==='splash'){const t=setTimeout(()=>setScr(hasProfile?'dash':'ob'),2500);return()=>clearTimeout(t)}},[scr]);
  useEffect(()=>{if(scr==='dash'&&!mot)loadMot()},[scr]);
  useEffect(()=>{if(chatEnd.current)chatEnd.current.scrollIntoView({behavior:'smooth'})},[msgs]);

  const cw=parseFloat(pro.currentWeight)||0, gw=parseFloat(pro.goalWeight)||0;
  const lost=wh.length>1?Math.round((wh[0]-wh[wh.length-1])*10)/10:0;
  const pct=wh.length>1&&gw?Math.min(100,Math.max(0,Math.round(((wh[0]-wh[wh.length-1])/(wh[0]-gw))*100))):0;
  const uc={name:pro.name||'Champ',cw:pro.currentWeight,gw:pro.goalWeight,unit:pro.unit,lost:Math.abs(lost),streak};
  const fullCtx=AI.buildContext(pro,dl,fl,wh,meas,notes,streak);

  const loadMot=async()=>{setMotL(true);setMot(await AI.motivation(fullCtx));setMotL(false)};

  const sendChat=async()=>{
    var val=ciRef.current?ciRef.current.value:'';
    if(!val.trim()||cL)return;
    const m=val.trim();
    if(ciRef.current)ciRef.current.value='';
    setCiBtn(false);
    const newMsgs=[].concat(msgs,[{r:'u',t:m}]);
    setMsgs(newMsgs);setCL(true);
    var sysPrompt=AI.systemPrompt(fullCtx);
    var historyToSend=newMsgs.slice(-20);
    var reply=await AI.callWithHistory(sysPrompt,historyToSend);
    if(!reply) reply='I am having trouble connecting right now. Try again in a moment! 🔥';
    setMsgs(function(p){return [].concat(p,[{r:'a',t:reply}])});setCL(false);
  };

  // ─── SPLASH ───
  if(scr==='splash') return (
    <div style={{height:'100vh',display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',background:'radial-gradient(ellipse at center,var(--smoke),var(--coal) 70%)',position:'relative'}}>
      <div style={{position:'absolute',inset:0,background:'radial-gradient(circle at 50% 40%,rgba(255,107,53,.08),transparent 60%)'}}/>
      <div className="ag" style={{width:100,height:100,borderRadius:28,background:'linear-gradient(135deg,var(--ember),var(--flame))',display:'flex',alignItems:'center',justifyContent:'center',marginBottom:28}}><Ic d={P.flame} s={48} c="white"/></div>
      <h1 className="serif au" style={{fontSize:52,background:'linear-gradient(135deg,var(--bone),var(--ember))',WebkitBackgroundClip:'text',WebkitTextFillColor:'transparent'}}>SHED</h1>
      <p className="au" style={{fontSize:14,color:'rgba(255,255,255,.6)',letterSpacing:'.15em',textTransform:'uppercase',marginTop:8,animationDelay:'.2s'}}>Drop the weight. Keep the fire.</p>
    </div>
  );

  // ─── ONBOARDING ───
  if(scr==='ob'){
    const steps=[
      {t:'What should we call you?',s:'Let\'s make this personal.',c:<input className="inf" placeholder="Your name" value={pro.name} onChange={e=>setPro(p=>({...p,name:e.target.value}))} style={{fontSize:18,textAlign:'center',padding:18}}/>,v:()=>pro.name.trim().length>0},
      {t:'Where are you starting?',s:'No judgment.',c:(
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div style={{display:'flex',gap:12}}><input className="inf" type="number" placeholder="Current weight" value={pro.currentWeight} onChange={e=>setPro(p=>({...p,currentWeight:e.target.value}))} style={{flex:1}}/><select className="inf" value={pro.unit} onChange={e=>setPro(p=>({...p,unit:e.target.value}))} style={{width:80}}><option value="kg">kg</option><option value="lbs">lbs</option></select></div>
          <div style={{display:'flex',gap:12}}><input className="inf" type="number" placeholder="Height" value={pro.height} onChange={e=>setPro(p=>({...p,height:e.target.value}))} style={{flex:1}}/><select className="inf" value={pro.heightUnit} onChange={e=>setPro(p=>({...p,heightUnit:e.target.value}))} style={{width:80}}><option value="cm">cm</option><option value="ft">ft</option></select></div>
        </div>),v:()=>pro.currentWeight&&pro.height},
      {t:'What\'s the target?',s:'Dream big.',c:(
        <div style={{display:'flex',flexDirection:'column',gap:16}}>
          <div style={{display:'flex',gap:12,alignItems:'center'}}><input className="inf" type="number" placeholder="Goal weight" value={pro.goalWeight} onChange={e=>setPro(p=>({...p,goalWeight:e.target.value}))} style={{flex:1,fontSize:18,textAlign:'center'}}/><span style={{color:'rgba(255,255,255,.6)'}}>{pro.unit}</span></div>
          {pro.currentWeight&&pro.goalWeight&&<div className="cd au" style={{textAlign:'center',padding:20}}><p style={{fontSize:13,color:'rgba(255,255,255,.6)',marginBottom:8}}>You want to shed</p><p className="serif" style={{fontSize:42,color:'var(--ember)'}}>{Math.abs(parseFloat(pro.currentWeight)-parseFloat(pro.goalWeight)).toFixed(1)}<span style={{fontSize:18,color:'rgba(255,255,255,.6)'}}> {pro.unit}</span></p></div>}
        </div>),v:()=>pro.goalWeight},
      {t:'How active are you?',s:'Be honest.',c:(
        <div style={{display:'flex',flexDirection:'column',gap:12}}>
          {[{v:'sedentary',l:'Sedentary',d:'Desk job'},{v:'light',l:'Lightly Active',d:'Light walks'},{v:'moderate',l:'Moderate',d:'Exercise 3-4x/week'},{v:'active',l:'Very Active',d:'Intense 5-6x/week'}].map(lv=>(
            <button key={lv.v} onClick={()=>setPro(p=>({...p,activityLevel:lv.v}))} className="cd" style={{textAlign:'left',cursor:'pointer',border:pro.activityLevel===lv.v?'2px solid var(--ember)':'1px solid rgba(255,255,255,.06)',background:pro.activityLevel===lv.v?'rgba(255,107,53,.06)':'transparent'}}><p style={{fontWeight:600}}>{lv.l}</p><p style={{fontSize:13,color:'rgba(255,255,255,.6)',marginTop:4}}>{lv.d}</p></button>
          ))}
        </div>),v:()=>true}
    ];
    const st=steps[ob];
    return(
      <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',display:'flex',flexDirection:'column',background:'var(--coal)'}}>
        <div style={{padding:'24px 24px 0'}}><div style={{display:'flex',gap:6,marginBottom:40}}>{steps.map((_,i)=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=ob?'var(--ember)':'rgba(255,255,255,.1)'}}/>)}</div></div>
        <div className="au" key={ob} style={{flex:1,padding:'0 24px',display:'flex',flexDirection:'column'}}>
          <h2 className="serif" style={{fontSize:32,lineHeight:1.2,marginBottom:8}}>{st.t}</h2>
          <p style={{fontSize:15,color:'rgba(255,255,255,.6)',marginBottom:36}}>{st.s}</p>
          <div style={{flex:1}}>{st.c}</div>
        </div>
        <div style={{padding:24,display:'flex',gap:12}}>
          {ob>0&&<button className="bs" onClick={()=>setOb(o=>o-1)} style={{padding:'14px 24px',width:'auto'}}><Ic d={P.back} s={18}/></button>}
          <button className="bp" disabled={!st.v()} onClick={()=>{
            if(!st.v())return;
            if(ob<steps.length-1){setOb(o=>o+1)}
            else{
              const c=parseFloat(pro.currentWeight);
              if(wh.length===0){setWh([c]);}
              go('dash');
            }
          }}>{ob<steps.length-1?'Continue':'Start Shedding 🔥'}</button>
        </div>
      </div>
    );
  }

  // ─── TABS ───
  const tabs=[{id:'dash',l:'Home',p:P.home},{id:'coach',l:'AI Coach',p:P.sparkle},{id:'prog',l:'Progress',p:P.chart},{id:'prof',l:'Profile',p:P.user}];
  const showTabs=['dash','coach','prog','prof'].includes(scr);

  return(
    <div style={{maxWidth:480,margin:'0 auto',minHeight:'100vh',background:'var(--coal)',position:'relative'}}>
      {toast&&<Toast msg={toast} onClose={()=>setToast(null)}/>}

      {/* MODALS */}
      <Sheet open={md==='water'} onClose={()=>setMd(null)} title="Log Water 💧">
        <div style={{display:'flex',justifyContent:'center',gap:6,marginBottom:24}}>{Array.from({length:8}).map((_,i)=>(<div key={i} onClick={()=>setMi({water:i+1})} style={{width:34,height:48,borderRadius:10,background:i<((nn(mi.water,dl.water)))?'rgba(52,152,219,.25)':'rgba(255,255,255,.04)',border:'1px solid '+(i<((nn(mi.water,dl.water)))?'rgba(52,152,219,.5)':'rgba(255,255,255,.08)'),cursor:'pointer',display:'flex',alignItems:'flex-end',justifyContent:'center',paddingBottom:6}}>{i<((nn(mi.water,dl.water)))&&<Ic d={P.water} s={16} c="#3498DB"/>}</div>))}</div>
        <div style={{display:'flex',alignItems:'center',gap:20,justifyContent:'center',marginBottom:20}}><button className="sbtn" onClick={()=>setMi(p=>({water:Math.max(0,((nn(p.water,dl.water)))-1)}))}>−</button><div><span className="serif" style={{fontSize:48,color:'#3498DB'}}>{(nn(mi.water,dl.water))}</span><span style={{fontSize:16,color:'rgba(255,255,255,.55)',marginLeft:6}}>glasses</span></div><button className="sbtn" onClick={()=>setMi(p=>({water:Math.min(20,((nn(p.water,dl.water)))+1)}))}>+</button></div>
        <input className="inf" type="number" placeholder="Or type exact..." onChange={e=>setMi({water:parseInt(e.target.value)||0})} style={{marginBottom:16}}/>
        <button className="bp" onClick={()=>{setDl(p=>({...p,water:(nn(mi.water,p.water))}));setMd(null);tt('Water: '+((nn(mi.water,dl.water)))+' glasses 💧')}}>Save</button>
      </Sheet>

      <Sheet open={md==='cal'} onClose={()=>setMd(null)} title="Log Calories 🍽️">
        <div style={{display:'flex',alignItems:'center',gap:20,justifyContent:'center',marginBottom:20}}><button className="sbtn" onClick={()=>setMi(p=>({cal:Math.max(0,((nn(p.cal,dl.calories)))-50)}))}>−</button><div style={{textAlign:'center'}}><span className="serif" style={{fontSize:48,color:'#E67E22'}}>{(nn(mi.cal,dl.calories))}</span><span style={{fontSize:16,color:'rgba(255,255,255,.55)',marginLeft:6}}>kcal</span></div><button className="sbtn" onClick={()=>setMi(p=>({cal:((nn(p.cal,dl.calories)))+50}))}>+</button></div>
        <input className="inf" type="number" placeholder="Type exact..." onChange={e=>setMi({cal:parseInt(e.target.value)||0})} style={{marginBottom:12}}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:16}}>{[{l:'Snack',c:150},{l:'Light',c:350},{l:'Full',c:600}].map(q=>(<button key={q.l} className="cd" onClick={()=>setMi(p=>({cal:((nn(p.cal,dl.calories)))+q.c}))} style={{cursor:'pointer',textAlign:'center',padding:14}}><p style={{fontSize:18,fontWeight:700,color:'#E67E22'}}>{q.c}</p><p style={{fontSize:11,color:'rgba(255,255,255,.55)'}}>{q.l}</p></button>))}</div>
        <button className="bp" onClick={()=>{setDl(p=>({...p,calories:(nn(mi.cal,p.calories))}));setMd(null);tt('Calories: '+((nn(mi.cal,dl.calories))))}}>Save</button>
      </Sheet>

      <Sheet open={md==='steps'} onClose={()=>setMd(null)} title="Log Steps 🚶">
        <div style={{display:'flex',alignItems:'center',gap:20,justifyContent:'center',marginBottom:20}}><button className="sbtn" onClick={()=>setMi(p=>({steps:Math.max(0,((nn(p.steps,dl.steps)))-500)}))}>−</button><div style={{textAlign:'center'}}><span className="serif" style={{fontSize:48,color:'#2ECC71'}}>{((nn(mi.steps,dl.steps))).toLocaleString()}</span><span style={{fontSize:14,color:'rgba(255,255,255,.55)',marginLeft:6}}>steps</span></div><button className="sbtn" onClick={()=>setMi(p=>({steps:((nn(p.steps,dl.steps)))+500}))}>+</button></div>
        <input className="inf" type="number" placeholder="Type exact..." onChange={e=>setMi({steps:parseInt(e.target.value)||0})} style={{marginBottom:12}}/>
        <div style={{display:'flex',gap:8,marginBottom:16}}>{[1000,2500,5000,10000].map(s=>(<button key={s} className="cd" onClick={()=>setMi({steps:s})} style={{flex:1,cursor:'pointer',textAlign:'center',padding:12}}><p style={{fontSize:14,fontWeight:600,color:'#2ECC71'}}>{s>=1000?(s/1000)+'k':s}</p></button>))}</div>
        <button className="bp" onClick={()=>{setDl(p=>({...p,steps:(nn(mi.steps,p.steps))}));setMd(null);tt('Steps: '+((nn(mi.steps,dl.steps))))}}>Save</button>
      </Sheet>

      <Sheet open={md==='sleep'} onClose={()=>setMd(null)} title="Log Sleep 🌙">
        <div style={{display:'flex',alignItems:'center',gap:20,justifyContent:'center',marginBottom:20}}><button className="sbtn" onClick={()=>setMi(p=>({sleep:Math.max(0,((nn(p.sleep,dl.sleep)))-.5)}))}>−</button><div style={{textAlign:'center'}}><span className="serif" style={{fontSize:48,color:'#9B59B6'}}>{((nn(mi.sleep,dl.sleep))).toFixed(1)}</span><span style={{fontSize:16,color:'rgba(255,255,255,.55)',marginLeft:6}}>hrs</span></div><button className="sbtn" onClick={()=>setMi(p=>({sleep:Math.min(24,((nn(p.sleep,dl.sleep)))+.5)}))}>+</button></div>
        <p style={{fontSize:13,color:'rgba(255,255,255,.55)',marginBottom:10}}>QUALITY</p>
        <div style={{display:'flex',gap:8,marginBottom:16}}>{['😴 Poor','😐 Fair','😊 Good','🌟 Great'].map(q=>(<button key={q} onClick={()=>setMi(p=>({...p,sq:q}))} className="cd" style={{flex:1,cursor:'pointer',textAlign:'center',padding:10,fontSize:12,border:mi.sq===q?'1px solid #9B59B6':'1px solid rgba(255,255,255,.06)',background:mi.sq===q?'rgba(155,89,182,.1)':'transparent'}}>{q}</button>))}</div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:16}}><div><p style={{fontSize:12,color:'rgba(255,255,255,.55)',marginBottom:6}}>Bedtime</p><input className="inf" type="time" value={mi.bed||''} onChange={e=>setMi(p=>({...p,bed:e.target.value}))}/></div><div><p style={{fontSize:12,color:'rgba(255,255,255,.55)',marginBottom:6}}>Wake</p><input className="inf" type="time" value={mi.wake||''} onChange={e=>setMi(p=>({...p,wake:e.target.value}))}/></div></div>
        <button className="bp" onClick={()=>{setDl(p=>({...p,sleep:(nn(mi.sleep,p.sleep))}));setMd(null);tt('Sleep: '+((nn(mi.sleep,dl.sleep))).toFixed(1)+'hrs')}}>Save</button>
      </Sheet>

      <Sheet open={md==='food'} onClose={()=>setMd(null)} title="Log Food 🍎">
        <p style={{fontSize:13,color:'rgba(255,255,255,.6)',marginBottom:14}}>Describe what you ate — AI estimates nutrition.</p>
        <textarea className="inf" placeholder="e.g. 2 eggs, toast with butter" value={mi.fd||''} onChange={e=>setMi(p=>({...p,fd:e.target.value}))} style={{minHeight:80,marginBottom:12}}/>
        <button className="bp" disabled={!(mi.fd&&mi.fd.trim())||afL} onClick={async()=>{setAfL(true);const r=await AI.analyzeMeal(mi.fd,fullCtx);setAfL(false);setFl(p=>[...p,r]);setDl(p=>({...p,calories:p.calories+r.calories}));setMi({});setMd(null);tt('Logged: '+r.name+' ('+r.calories+' cal)')}} style={{display:'flex',alignItems:'center',justifyContent:'center',gap:8,marginBottom:20}}><Ic d={P.sparkle} s={16} c="white" f={true}/> {afL?'Analyzing...':'Analyze with AI'}</button>
        <div style={{borderTop:'1px solid rgba(255,255,255,.06)',paddingTop:20}}><p style={{fontSize:13,color:'rgba(255,255,255,.55)',marginBottom:12}}>OR MANUALLY</p><input className="inf" placeholder="Food name" style={{marginBottom:10}} value={mi.mn||''} onChange={e=>setMi(p=>({...p,mn:e.target.value}))}/><div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}><input className="inf" type="number" placeholder="Calories" value={mi.mc||''} onChange={e=>setMi(p=>({...p,mc:e.target.value}))}/><input className="inf" type="number" placeholder="Protein(g)" value={mi.mp||''} onChange={e=>setMi(p=>({...p,mp:e.target.value}))}/><input className="inf" type="number" placeholder="Carbs(g)" value={mi.mcb||''} onChange={e=>setMi(p=>({...p,mcb:e.target.value}))}/><input className="inf" type="number" placeholder="Fat(g)" value={mi.mf||''} onChange={e=>setMi(p=>({...p,mf:e.target.value}))}/></div><button className="bs" onClick={()=>{if(!mi.mn)return;const e={name:mi.mn,calories:parseInt(mi.mc)||0,protein:(mi.mp||0)+'g',carbs:(mi.mcb||0)+'g',fat:(mi.mf||0)+'g'};setFl(p=>[...p,e]);setDl(p=>({...p,calories:p.calories+e.calories}));setMi({});setMd(null);tt('Logged: '+e.name)}}>Log Manually</button></div>
      </Sheet>

      <Sheet open={md==='exercise'} onClose={()=>setMd(null)} title="Log Exercise 💪">
        <input className="inf" placeholder="Exercise type" style={{marginBottom:12}} value={mi.et||''} onChange={e=>setMi(p=>({...p,et:e.target.value}))}/>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12}}><div><p style={{fontSize:12,color:'rgba(255,255,255,.55)',marginBottom:6}}>Duration (min)</p><input className="inf" type="number" placeholder="30" value={mi.ed||''} onChange={e=>setMi(p=>({...p,ed:e.target.value}))}/></div><div><p style={{fontSize:12,color:'rgba(255,255,255,.55)',marginBottom:6}}>Cal burned</p><input className="inf" type="number" placeholder="200" value={mi.ec||''} onChange={e=>setMi(p=>({...p,ec:e.target.value}))}/></div></div>
        <p style={{fontSize:12,color:'rgba(255,255,255,.55)',marginBottom:8}}>INTENSITY</p>
        <div style={{display:'flex',gap:8,marginBottom:16}}>{['Light','Moderate','Intense'].map(lv=>(<button key={lv} onClick={()=>setMi(p=>({...p,ei:lv}))} className="cd" style={{flex:1,cursor:'pointer',textAlign:'center',padding:12,fontSize:13,border:mi.ei===lv?'1px solid var(--flame)':'1px solid rgba(255,255,255,.06)',background:mi.ei===lv?'rgba(255,159,28,.1)':'transparent'}}>{lv}</button>))}</div>
        <button className="bp" onClick={()=>{if(!mi.et)return;setDl(p=>({...p,exercise:p.exercise+(parseInt(mi.ec)||0)}));setMi({});setMd(null);tt('Logged: '+mi.et+' 💪')}}>Log Exercise</button>
      </Sheet>

      <Sheet open={md==='weight'} onClose={()=>setMd(null)} title="Log Weight ⚖️">
        <div style={{textAlign:'center',marginBottom:8}}><ProgressRing progress={pct} size={140} stroke={8}/><p style={{marginTop:-40,marginBottom:24,fontSize:13,color:'rgba(255,255,255,.55)'}}>{pct}% to goal</p></div>
        <input className="inf" type="number" step="0.1" placeholder={'Weight in '+pro.unit} value={mi.wt||''} onChange={e=>setMi({wt:e.target.value})} style={{fontSize:22,textAlign:'center',padding:18,marginBottom:12}}/>
        <div style={{display:'flex',gap:8,marginBottom:16}}>{[-0.5,-0.1,0,0.1,0.5].map(d=>(<button key={d} onClick={()=>setMi({wt:String((cw+d).toFixed(1))})} className="cd" style={{flex:1,cursor:'pointer',textAlign:'center',padding:10,fontSize:13}}>{d>0?'+':''}{d}</button>))}</div>
        <button className="bp" onClick={()=>{const v=parseFloat(mi.wt);if(isNaN(v))return;setWh(p=>[...p,v]);setPro(p=>({...p,currentWeight:String(v)}));setMi({});setMd(null);tt('Weight: '+v+pro.unit+' 🔥')}}>Log Weight 🔥</button>
      </Sheet>

      <Sheet open={md==='meas'} onClose={()=>setMd(null)} title="Measurements 📏">
        {[{k:'waist',l:'Waist'},{k:'chest',l:'Chest'},{k:'hips',l:'Hips'},{k:'arms',l:'Arms'},{k:'thighs',l:'Thighs'}].map(m=>(<div key={m.k} style={{display:'flex',alignItems:'center',gap:12,marginBottom:12}}><span style={{fontSize:14,width:60,color:'rgba(248,240,227,.6)'}}>{m.l}</span><input className="inf" type="number" step="0.1" placeholder="cm" value={nn(mi['m_'+m.k], meas[m.k]||'')} onChange={e=>setMi(p=>({...p,['m_'+m.k]:e.target.value}))} style={{flex:1}}/></div>))}
        <button className="bp" style={{marginTop:8}} onClick={()=>{setMeas(p=>({...p,waist:mi.m_waist||p.waist,chest:mi.m_chest||p.chest,hips:mi.m_hips||p.hips,arms:mi.m_arms||p.arms,thighs:mi.m_thighs||p.thighs}));setMi({});setMd(null);tt('Saved! 📏')}}>Save</button>
      </Sheet>

      <Sheet open={md==='notes'} onClose={()=>setMd(null)} title="Daily Notes 📝">
        <textarea className="inf" placeholder="How are you feeling?" style={{minHeight:140}} value={(nn(mi.nt,notes))} onChange={e=>setMi({nt:e.target.value})}/>
        <div style={{display:'flex',flexWrap:'wrap',gap:6,marginTop:12}}>{['😊 Happy','😤 Motivated','😴 Tired','😋 Cravings','💪 Strong'].map(t=>(<button key={t} onClick={()=>setMi(p=>({nt:(p.nt||notes)+' '+t}))} className="tg" style={{cursor:'pointer',background:'rgba(255,255,255,.05)',border:'1px solid rgba(255,255,255,.08)',color:'var(--bone)'}}>{t}</button>))}</div>
        <button className="bp" style={{marginTop:16}} onClick={()=>{setNotes(mi.nt||'');setMi({});setMd(null);tt('Saved!')}}>Save</button>
      </Sheet>

      {/* ═══ DASHBOARD ═══ */}
      {scr==='dash'&&(<div style={{paddingBottom:90}}>

      {scr==='prof'&&(<div style={{minHeight:'100vh',padding:24,paddingBottom:100}}><h2 className="serif" style={{fontSize:28,marginBottom:24}}>Profile</h2><div className="cd" style={{padding:24,marginBottom:16,display:'flex',alignItems:'center',gap:16}}><div style={{width:64,height:64,borderRadius:20,background:'linear-gradient(135deg,var(--ember),var(--flame))',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,fontWeight:700}}>{(pro.name||'U')[0].toUpperCase()}</div><div><h3 style={{fontSize:18,fontWeight:700}}>{pro.name}</h3></div></div><div className="cd" style={{marginBottom:16}}>{[{l:'Weight',v:pro.currentWeight+' '+pro.unit},{l:'Goal',v:pro.goalWeight+' '+pro.unit},{l:'Height',v:pro.height+' '+pro.heightUnit},{l:'Activity',v:pro.activityLevel}].map((it,i)=>(<div key={i} style={{display:'flex',justifyContent:'space-between',padding:'14px 0',borderBottom:i<3?'1px solid rgba(255,255,255,.05)':'none'}}><span style={{fontSize:14,color:'rgba(255,255,255,.6)'}}>{it.l}</span><span style={{fontSize:14,fontWeight:500}}>{it.v}</span></div>))}</div><button onClick={()=>{DB.c();window.location.reload()}} className="bs" style={{color:'var(--glow)'}}>Reset All Data</button></div>)}

      {/* NOTIFS */}
      {notifs&&<div style={{position:'fixed',inset:0,zIndex:100}}><div style={{position:'absolute',inset:0,background:'rgba(0,0,0,.6)'}} onClick={()=>setNotifs(false)}/><div className="au" style={{position:'relative',width:'100%',maxWidth:420,margin:'0 auto',background:'var(--coal)',borderRadius:'0 0 24px 24px',padding:24,maxHeight:'70vh',overflowY:'auto'}}><div style={{display:'flex',justifyContent:'space-between',marginBottom:20}}><h3 style={{fontSize:18,fontWeight:700}}>Notifications</h3><button onClick={()=>setNotifs(false)} style={{background:'none',border:'none',cursor:'pointer',color:'var(--bone)'}}><Ic d={P.x} s={20}/></button></div>{[{t:'Weigh-in Reminder',m:'Time for your morning weigh-in!',tm:'8:00 AM',p:P.scale,c:'#FF6B35'},{t:'Water Check 💧',m:'Have you hit 8 glasses yet?',tm:'12:30 PM',p:P.water,c:'#3498DB'},{t:streak+'-Day Streak! 🔥',m:'Keep the chain going!',tm:'Yesterday',p:P.flame,c:'#FF9F1C'}].map((n,i)=>(<div key={i} className="cd" style={{marginBottom:12,padding:16,opacity:0,animation:'fadeUp .4s ease '+i*0.1+'s forwards'}}><div style={{display:'flex',gap:12}}><div style={{width:36,height:36,borderRadius:10,background:'rgba('+parseInt(n.c.slice(1,3),16)+','+parseInt(n.c.slice(3,5),16)+','+parseInt(n.c.slice(5,7),16)+',.15)',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}><Ic d={n.p} s={18} c={n.c}/></div><div><p style={{fontWeight:600,fontSize:14,marginBottom:4}}>{n.t}</p><p style={{fontSize:13,color:'rgba(248,240,227,.6)',lineHeight:1.5}}>{n.m}</p><p style={{fontSize:11,color:'rgba(255,255,255,.4)',marginTop:6}}>{n.tm}</p></div></div></div>))}</div></div>}

      {/* TAB BAR */}
      {showTabs&&(<div style={{position:'fixed',bottom:0,left:0,right:0,zIndex:50,background:'rgba(26,26,46,.95)',backdropFilter:'blur(20px)',borderTop:'1px solid rgba(255,255,255,.06)',display:'flex',justifyContent:'space-around',padding:'8px 0 24px',maxWidth:480,margin:'0 auto'}}>{tabs.map(t=>(<button key={t.id} onClick={()=>go(t.id)} style={{background:'none',border:'none',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:4,padding:'8px 16px',color:scr===t.id?'var(--ember)':'rgba(248,240,227,.3)'}}><Ic d={t.p} s={22} c={scr===t.id?'var(--ember)':'rgba(248,240,227,.3)'} f={t.p===P.sparkle}/><span style={{fontSize:10,fontWeight:scr===t.id?600:400,fontFamily:"'Sora'"}}>{t.l}</span></button>))}</div>)}
    </div>
  );
}

ReactDOM.render(React.createElement(App), document.getElementById('root'));
</script>
</body>
</html>
