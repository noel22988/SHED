function calcMacros(p){
  var w=+p.weight,bf=+p.bodyFat/100,lbm=w*(1-bf);
  var bmr=Math.round(370+21.6*lbm);
  var tm={'2':1.2,'3':1.375,'4':1.46,'5':1.55,'6':1.725};
  var tdee=Math.round(bmr*(tm[p.trainingDays]||1.375));
  var tM={cut:0.725,bulk:1.125,recomp:1.0};
  var cM={cut:0.75,bulk:1.15,recomp:1.02};
  var fM={cut:0.70,bulk:1.10,recomp:0.98};
  var target=Math.round(tdee*(tM[p.goal]||0.725));
  var protein=Math.round(lbm*2.5);
  var fat=Math.max(50,Math.round(lbm*0.8));
  var carbs=Math.max(0,Math.round((target-protein*4-fat*9)/4));
  return{lbm:Math.round(lbm),bmr:bmr,tdee:tdee,target:target,
    ceiling:Math.round(tdee*(cM[p.goal]||0.75)),
    floor:Math.round(tdee*(fM[p.goal]||0.70)),
    protein:protein,fat:fat,carbs:carbs};
}

async function askClaude(system,user,tokens){
  tokens=tokens||1200;
  try{
    var r=await fetch('/api/claude',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({system:system,messages:[{role:'user',content:user}],max_tokens:tokens})
    });
    var d=await r.json();
    return(d.content&&d.content[0]&&d.content[0].text)||'Error - please try again.';
  }catch(e){return 'Network error - please try again.';}
}

  return h('div',{style:{padding:'1.5rem 1rem',maxWidth:'420px',margin:'0 auto'}},
    props.onBack&&h('button',{onClick:props.onBack,style:{background:'none',border:'none',cursor:'pointer',color:'var(--text2)',padding:'0 0 16px',fontSize:'13px',display:'flex',alignItems:'center',gap:'4px'}},

function ProgrammeTab(props){
  var p=props.profile;
  var s1=useState(''),s2=useState(false);
  var result=s1[0],setResult=s1[1],loading=s2[0],setLoading=s2[1];
  var gMap={cut:'aggressive fat loss',bulk:'lean muscle gain',recomp:'body recomposition'};
  async function gen(){
    setLoading(true);setResult('');
    var txt=await askClaude(
      'You are an elite strength coach. Use clear section headers. Compound movements first. Be specific with sets, reps, progression.',
      'Design a 12-week Hypertrophy and Strength programme for '+p.name+': '+p.weight+'kg, '+p.height+'cm, ~'+p.bodyFat+'% body fat. Training: '+p.trainingDays+' days/week on '+p.equipment+'. Goal: '+(gMap[p.goal]||p.goal)+'.\nInclude: weekly split, exercises with sets x reps, double progression system (when to add weight), phases Foundation wk1-4 / Accumulation wk5-8 / Intensification wk9-12, deload rules.',
      1500
    );
    setResult(txt);setLoading(false);
  }
  return h('div',{style:{padding:'1rem'}},
    h('h2',{style:{margin:'0 0 4px'}},'Training programme'),
    h('p',{style:{margin:'0 0 1rem',fontSize:'13px',color:'var(--text2)'}},p.trainingDays+'x/week - '+p.equipment+' - 12-week hypertrophy + strength'),
    h(Btn,{onClick:gen,disabled:loading,full:true},result?'Regenerate plan':'Generate my 12-week plan'),
    loading?h('div',{style:{marginTop:'14px'}},h(Spinner)):null,
    result?h('div',{style:{marginTop:'12px'}},h(AIOut,{text:result})):null
  );
}

function MacrosTab(props){
  var m=props.macros,p=props.profile;
  var total=m.protein*4+m.carbs*4+m.fat*9;
  var pP=Math.round(m.protein*4/total*100);
  var cP=Math.round(m.carbs*4/total*100);
  var fP=100-pP-cP;
  var gLabel={cut:'Aggressive cut',bulk:'Lean bulk',recomp:'Recomp'};
  return h('div',{style:{padding:'1rem'}},
    h('h2',{style:{margin:'0 0 1rem'}},'Daily macros'),
    h(Card,{accent:true},
      h('div',{style:{textAlign:'center',padding:'0.25rem 0 0.5rem'}},
        h('div',{style:{fontSize:'11px',color:'var(--text2)',letterSpacing:'0.5px',marginBottom:'6px'}},(gLabel[p.goal]||'Goal').toUpperCase()+' - DAILY TARGET'),
        h('div',{style:{fontSize:'56px',fontWeight:500,lineHeight:1,color:G}},m.target),
        h('div',{style:{fontSize:'13px',color:'var(--text2)',marginBottom:'1rem'}},'kcal / day'),
        h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'4px',paddingTop:'12px',borderTop:'0.5px solid var(--border)'}},
          [['Floor',m.floor],['Target',m.target],['Ceiling',m.ceiling]].map(function(item){
            return h('div',{key:item[0]},

function CoachTab(props){
  var p=props.profile,m=props.macros;
  var s1=useState(function(){return load('shed_checkins_v2')||[];});
  var checkins=s1[0],setCheckins=s1[1];
  var s2=useState({weight:'',lifts:'',energy:'7',notes:''});
  var form=s2[0],setForm=s2[1];
  var s3=useState(''),s4=useState(false),s5=useState(false),s6=useState(false);
  var analysis=s3[0],setAnalysis=s3[1];
  var loading=s4[0],setLoading=s4[1];
  var showHist=s5[0],setShowHist=s5[1];
  var saved=s6[0],setSaved=s6[1];
  function uf(k,v){setForm(function(f){var n=Object.assign({},f);n[k]=v;return n;});}
  function saveCheckin(){
    if(!form.weight||!form.lifts)return;
    var entry=Object.assign({},form,{
      date:new Date().toLocaleDateString('en-SG',{day:'2-digit',month:'short'}),
      week:checkins.length+1,ts:Date.now()
    });
    var updated=checkins.concat([entry]);
    setCheckins(updated);save('shed_checkins_v2',updated);
    setForm({weight:'',lifts:'',energy:'7',notes:''});
    setSaved(true);setTimeout(function(){setSaved(false);},2000);
  }
  async function getCoaching(){
    if(checkins.length===0)return;
    setLoading(true);setAnalysis('');
    var hist=checkins.map(function(c){
      return 'Week '+c.week+' ('+c.date+'): '+c.weight+'kg | lifts: '+c.lifts+' | energy: '+c.energy+'/10'+(c.notes?' | '+c.notes:'');
    }).join('\n');
    var txt=await askClaude(
      'You are '+p.name+"'s head transformation coach. Be direct. End with one clear directive in caps: REFEED NOW / HOLD THE LINE / CUT HARDER / ADD CALORIES - state exact number changes.",
      'Coach, analyse my progress. Start: ~'+p.weight+'kg. Goal: '+p.goal+'. Targets: '+m.target+' kcal, '+m.protein+'g protein.\n\nHistory:\n'+hist+'\n\nWhat happened, why, and what exactly do I do this week?',
      800
    );
    setAnalysis(txt);setLoading(false);
  }
  var idx=null;
  if(checkins.length>=2){
    var last=checkins[checkins.length-1],prev=checkins[checkins.length-2];
    var delta=+(+last.weight-+prev.weight).toFixed(1);
    var en=+last.energy;
    idx={sa:delta<-0.3?'down':delta>0.3?'up':'stable',sv:delta<-0.3?Math.abs(delta)+'kg lost':delta>0.3?delta+'kg up':'Stable',sg:delta<-0.1,
      ea:en>=7?'up':en>=5?'stable':'down',es:en>=7?'High':en>=5?'Moderate':'Fatigued',eg:en>=6};
  }
  var arrow={up:'↑',down:'↓',stable:'→'};
  return h('div',{style:{padding:'1rem'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'1rem'}},
      h('h2',{style:{margin:0}},'My coach'),
      checkins.length>0?h('button',{onClick:function(){setShowHist(function(s){return!s;});},style:{background:'none',border:'none',cursor:'pointer',color:'var(--text2)',fontSize:'12px'}},
        showHist?'Hide history':checkins.length+' check-ins'):null
    ),
    idx?h(Card,{accent:true},
      h(Lbl,null,'SHED Index - Week '+checkins.length),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(3,minmax(0,1fr))',gap:'8px',textAlign:'center'}},
        [['Scale',arrow[idx.sa],idx.sv,idx.sg],['Strength',arrow.stable,'Tracking',true],['Energy',arrow[idx.ea],idx.es,idx.eg]].map(function(item){
          return h('div',{key:item[0],style:{background:'var(--bg2)',borderRadius:'var(--rm)',padding:'10px 4px'}},
            h('div',{style:{fontSize:'10px',color:'var(--text2)',marginBottom:'3px'}},item[0].toUpperCase()),
            h('div',{style:{fontSize:'28px',fontWeight:500,color:item[3]?G:'#D85A30',lineHeight:1}},item[1]),
            h('div',{style:{fontSize:'10px',color:'var(--text2)',marginTop:'3px'}},item[2])
          );
        })
      ),
      h('div',{style:{marginTop:'10px',textAlign:'center',fontSize:'12px',color:'var(--text2)'}},checkins.length+'-week streak')
    ):null,
    h(Card,null,
      h('div',{style:{fontWeight:500,marginBottom:'14px'}},'Week '+(checkins.length+1)+' check-in'),
      h('div',{style:{display:'grid',gridTemplateColumns:'repeat(2,minmax(0,1fr))',gap:'10px',marginBottom:'10px'}},
        h('div',null,h(Lbl,null,'Weight (kg)'),h('input',{type:'number',step:'0.1',value:form.weight,onChange:function(e){uf('weight',e.target.value);},placeholder:'74.5'})),
        h('div',null,h(Lbl,null,'Energy (1-10)'),h('input',{type:'number',min:'1',max:'10',value:form.energy,onChange:function(e){uf('energy',e.target.value);}}))
      ),
      h('div',{style:{marginBottom:'10px'}},
        h(Lbl,null,'Best lifts this week'),
        h('input',{value:form.lifts,onChange:function(e){uf('lifts',e.target.value);},placeholder:'Bench 60kgx8, Squat 80kgx6...'})
      ),
      h('div',{style:{marginBottom:'14px'}},
        h(Lbl,null,'Notes (optional)'),
        h('input',{value:form.notes,onChange:function(e){uf('notes',e.target.value);},placeholder:'CNY dinner, bad sleep, work travel...'})
      ),
      h('div',{style:{display:'flex',gap:'8px'}},
        h(Btn,{ghost:true,onClick:saveCheckin,disabled:!form.weight||!form.lifts},saved?'Saved!':'Save'),
        h(Btn,{onClick:getCoaching,disabled:loading||checkins.length===0,full:true},loading?'Analysing...':'Get coaching')
      ),
      checkins.length===0?h('div',{style:{marginTop:'10px',fontSize:'12px',color:'var(--text2)',textAlign:'center'}},'Save your first check-in to unlock coaching.'):null
    ),
    showHist&&checkins.length>0?h(Card,null,
      h('div',{style:{fontWeight:500,marginBottom:'12px'}},'Check-in history'),
      checkins.slice().reverse().map(function(c,i,arr){
        return h('div',{key:i,style:{paddingBottom:'10px',marginBottom:'10px',borderBottom:i<arr.length-1?'0.5px solid var(--border)':'none'}},
          h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'2px'}},
            h('span',{style:{fontWeight:500,fontSize:'13px'}},'Week '+c.week+' - '+c.date),
            h('span',{style:{color:G,fontWeight:500,fontSize:'14px'}},c.weight+'kg')
          ),
          h('div',{style:{fontSize:'12px',color:'var(--text2)'}},'Energy '+c.energy+'/10 - '+c.lifts),
          c.notes?h('div',{style:{fontSize:'11px',color:'var(--text2)',marginTop:'2px',fontStyle:'italic'}},c.notes):null
        );
      })
    ):null,
    loading?h(Spinner):null,
    analysis?h(AIOut,{text:analysis}):null
  );
}

var TABS=[
  {id:'programme',icon:'ti-barbell',label:'Plan'},
  {id:'macros',icon:'ti-calculator',label:'Macros'},
  {id:'meals',icon:'ti-bowl',label:'Meals'},
  {id:'form',icon:'ti-activity',label:'Form'},
  {id:'finisher',icon:'ti-flame',label:'Burn'},
  {id:'coach',icon:'ti-chart-line',label:'Coach'}
];

function App(){
  var s1=useState(function(){return load('shed_profile_v2');});

  var s3=useState(false);
  var editProfile=s3[0],setEditProfile=s3[1];

  if(!profile||editProfile){
    return h(ProfileSetup,{onDone:saveProfile,existing:editProfile?profile:null,onBack:editProfile?function(){setEditProfile(false);}:null});
  }
  var macros=calcMacros(profile);
  var content=null;
  if(tab==='programme')content=h(ProgrammeTab,{profile:profile});
  else if(tab==='macros')content=h(MacrosTab,{profile:profile,macros:macros});
  else if(tab==='meals')content=h(MealsTab,{profile:profile,macros:macros});
  else if(tab==='form')content=h(FormTab,{profile:profile});
  else if(tab==='finisher')content=h(FinisherTab,{profile:profile});
  else if(tab==='coach')content=h(CoachTab,{profile:profile,macros:macros});
  return h('div',{style:{display:'flex',flexDirection:'column',height:'100dvh',maxWidth:'480px',margin:'0 auto',background:'var(--bg2)'}},
    h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'12px 1rem 8px',borderBottom:'0.5px solid var(--border)',background:'var(--bg)',flexShrink:0}},
      h('div',{style:{display:'flex',alignItems:'baseline',gap:'8px'}},
        h('span',{style:{fontWeight:600,fontSize:'16px',color:G,letterSpacing:'-0.5px'}},'SHED'),
        h('span',{style:{fontSize:'13px',color:'var(--text2)'}},profile.name)
      ),
      h('button',{onClick:function(){setEditProfile(true);},style:{background:'none',border:'none',cursor:'pointer',color:'var(--text2)',padding:'4px'}},
        h('i',{className:'ti ti-settings',style:{fontSize:'16px'}})
      )
    ),
    h('div',{style:{flex:1,overflowY:'auto'}},content),
    h('div',{style:{display:'grid',gridTemplateColumns:'repeat(6,1fr)',borderTop:'0.5px solid var(--border)',background:'var(--bg)',flexShrink:0}},
      TABS.map(function(t){
        var active=tab===t.id;
        return h('button',{key:t.id,onClick:function(){setTab(t.id);},style:{display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center',padding:'8px 2px 6px',background:'none',border:'none',cursor:'pointer',borderTop:active?'2px solid '+G:'2px solid transparent'}},
          h('i',{className:'ti '+t.icon,style:{fontSize:'18px',color:active?G:'var(--text2)'}}),
          h('span',{style:{fontSize:'9px',marginTop:'3px',color:active?G:'var(--text2)',fontWeight:active?600:400}},t.label)
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App));
</script>
