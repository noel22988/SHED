function load(k) { try { var v = localStorage.getItem(k); return v ? JSON.parse(v) : null; } catch(e) { return null; } }
function save(k, v) { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} }

// ── MACRO CALC ───────────────────────────────────────────────────
function calcMacros(p) {
  var w = +p.weight, bf = +p.bodyFat / 100;
  var lbm = w * (1 - bf);
  var bmr = Math.round(370 + 21.6 * lbm);
  var mults = { '2': 1.2, '3': 1.375, '4': 1.46, '5': 1.55, '6': 1.725 };
  var tdee = Math.round(bmr * (mults[p.trainingDays] || 1.375));
  var tM = { cut: 0.725, bulk: 1.125, recomp: 1.0 };
  var cM = { cut: 0.75,  bulk: 1.15,  recomp: 1.02 };
  var fM = { cut: 0.70,  bulk: 1.10,  recomp: 0.98 };
  var target = Math.round(tdee * (tM[p.goal] || 0.725));
  var protein = Math.round(lbm * 2.5);
  var fat = Math.max(50, Math.round(lbm * 0.8));
  var carbs = Math.max(0, Math.round((target - protein * 4 - fat * 9) / 4));
  return { lbm: Math.round(lbm), bmr: bmr, tdee: tdee, target: target,
    ceiling: Math.round(tdee * (cM[p.goal] || 0.75)),
    floor: Math.round(tdee * (fM[p.goal] || 0.70)),
    protein: protein, fat: fat, carbs: carbs };
}

// ── AI CALL ──────────────────────────────────────────────────────
async function askClaude(system, user, tokens) {
  tokens = tokens || 1200;
  try {
    var r = await fetch('/api/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system: system, messages: [{ role: 'user', content: user }], max_tokens: tokens })
    });
    var d = await r.json();
    return (d.content && d.content[0] && d.content[0].text) || 'Error — please try again.';
  } catch(e) { return 'Network error — please try again.'; }
}

      ),
      React.createElement('div', { style: { display: 'flex', gap: '8px' } },
        React.createElement(Btn, { ghost: true, onClick: saveCheckin, disabled: !form.weight || !form.lifts }, saved ? '✓ Saved' : 'Save'),
        React.createElement(Btn, { onClick: getCoaching, disabled: loading || checkins.length === 0, full: true }, loading ? 'Analysing...' : 'Get coaching →')
      ),
      checkins.length === 0 && React.createElement('div', { style: { marginTop: '10px', fontSize: '12px', color: 'var(--text2)', textAlign: 'center' } }, 'Save your first check-in to unlock coaching.')
    ),

    showHist && checkins.length > 0 && React.createElement(Card, null,
      React.createElement('div', { style: { fontWeight: 500, marginBottom: '12px' } }, 'Check-in history'),
      checkins.slice().reverse().map(function(c, i, arr) {
        return React.createElement('div', { key: i, style: { paddingBottom: '10px', marginBottom: '10px', borderBottom: i < arr.length - 1 ? '0.5px solid var(--border)' : 'none' } },
          React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: '2px' } },
            React.createElement('span', { style: { fontWeight: 500, fontSize: '13px' } }, 'Week ' + c.week + ' · ' + c.date),
            React.createElement('span', { style: { color: G, fontWeight: 500, fontSize: '14px' } }, c.weight + 'kg')
          ),
          React.createElement('div', { style: { fontSize: '12px', color: 'var(--text2)' } }, 'Energy ' + c.energy + '/10 · ' + c.lifts),
          c.notes && React.createElement('div', { style: { fontSize: '11px', color: 'var(--text2)', marginTop: '2px', fontStyle: 'italic' } }, c.notes)
        );
      })
    ),

    loading && React.createElement(Spinner),
    analysis && React.createElement(AIOut, { text: analysis })
  );
}

// ── ROOT APP ─────────────────────────────────────────────────────
var TABS = [
  { id: 'programme', icon: 'ti-barbell',    label: 'Plan'   },
  { id: 'macros',    icon: 'ti-calculator', label: 'Macros' },
  { id: 'meals',     icon: 'ti-bowl',       label: 'Meals'  },
  { id: 'form',      icon: 'ti-activity',   label: 'Form'   },
  { id: 'finisher',  icon: 'ti-flame',      label: 'Burn'   },
  { id: 'coach',     icon: 'ti-chart-line', label: 'Coach'  },
];

function App() {
  var [profile, setProfile] = React.useState(function() { return load('shed_profile_v2'); });
  var [tab, setTab] = React.useState('macros');
  var [editProfile, setEditProfile] = React.useState(false);

  var saveProfile = function(p) { setProfile(p); save('shed_profile_v2', p); setEditProfile(false); };

  if (!profile || editProfile) {
    return React.createElement(ProfileSetup, { onDone: saveProfile, existing: editProfile ? profile : null, onBack: editProfile ? function() { setEditProfile(false); } : null });
  }

  var macros = calcMacros(profile);

  var content = null;
  if (tab === 'programme') content = React.createElement(ProgrammeTab, { profile: profile });
  else if (tab === 'macros') content = React.createElement(MacrosTab, { profile: profile, macros: macros });
  else if (tab === 'meals') content = React.createElement(MealsTab, { profile: profile, macros: macros });
  else if (tab === 'form') content = React.createElement(FormTab, { profile: profile });
  else if (tab === 'finisher') content = React.createElement(FinisherTab, { profile: profile });
  else if (tab === 'coach') content = React.createElement(CoachTab, { profile: profile, macros: macros });

  return React.createElement('div', { style: { display: 'flex', flexDirection: 'column', height: '100dvh', maxWidth: '480px', margin: '0 auto', background: 'var(--bg2)' } },
    React.createElement('div', { style: { display: 'flex', justifyContent: 'space-between', alignItems: 'center', padding: '12px 1rem 8px', borderBottom: '0.5px solid var(--border)', background: 'var(--bg)', flexShrink: 0 } },
      React.createElement('div', { style: { display: 'flex', alignItems: 'baseline', gap: '8px' } },
        React.createElement('span', { style: { fontWeight: 600, fontSize: '16px', color: G, letterSpacing: '-0.5px' } }, 'SHED'),
        React.createElement('span', { style: { fontSize: '13px', color: 'var(--text2)' } }, profile.name)
      ),
      React.createElement('button', { onClick: function() { setEditProfile(true); }, style: { background: 'none', border: 'none', cursor: 'pointer', color: 'var(--text2)', padding: '4px' } },
        React.createElement('i', { className: 'ti ti-settings', style: { fontSize: '16px' } })
      )
    ),
    React.createElement('div', { style: { flex: 1, overflowY: 'auto' } }, content),
    React.createElement('div', { style: { display: 'grid', gridTemplateColumns: 'repeat(6,1fr)', borderTop: '0.5px solid var(--border)', background: 'var(--bg)', flexShrink: 0 } },
      TABS.map(function(t) {
        var active = tab === t.id;
        return React.createElement('button', {
          key: t.id, onClick: function() { setTab(t.id); },
          style: { display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', padding: '8px 2px 6px', background: 'none', border: 'none', cursor: 'pointer', borderTop: active ? '2px solid ' + G : '2px solid transparent' }
        },
          React.createElement('i', { className: 'ti ' + t.icon, style: { fontSize: '18px', color: active ? G : 'var(--text2)' } }),
          React.createElement('span', { style: { fontSize: '9px', marginTop: '3px', color: active ? G : 'var(--text2)', fontWeight: active ? 600 : 400 } }, t.label)
        );
      })
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
</script>
</body>
</html>
