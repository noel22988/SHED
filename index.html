/* AI SERVICE */
var AI={
  buildCtx:function(pro,dl,fl,wh,meas,notes,streak,phase){
    var cw=parseFloat(pro.currentWeight)||0,gw=parseFloat(pro.goalWeight)||0;
    var lost=wh.length>1?Math.round((wh[0]-wh[wh.length-1])*10)/10:0;
    var pct=wh.length>1&&gw?Math.min(100,Math.max(0,Math.round(((wh[0]-wh[wh.length-1])/(wh[0]-gw))*100))):0;
    var bmi=pro.height?Math.round(cw/Math.pow(parseFloat(pro.height)/100,2)*10)/10:null;
    var tdee=Math.round((pro.activityLevel==='sedentary'?1.2:pro.activityLevel==='light'?1.375:pro.activityLevel==='moderate'?1.55:1.725)*(10*cw+6.25*(parseFloat(pro.height)||170)-5*35+5));
    var def=Math.round(tdee*0.75);
    var c='## USER PROFILE\nName: '+pro.name+'\nCurrent: '+cw+pro.unit+' | Goal: '+gw+pro.unit+' | To lose: '+Math.abs(cw-gw).toFixed(1)+pro.unit+'\n';
    c+='Height: '+(pro.height||'?')+nn(pro.heightUnit,'cm')+' | BMI: '+(bmi||'?')+' | Activity: '+pro.activityLevel+'\n';
    c+='TDEE: ~'+tdee+' cal/day | Deficit target: ~'+def+' cal/day\n';
    c+='Total lost: '+Math.abs(lost)+pro.unit+' ('+pct+'%) | Streak: '+streak+' days\n';
    if(wh.length>1)c+='Recent weights: '+wh.slice(-7).join(', ')+'\n';
    c+='\n## TODAY ('+D.nice()+')\nWater: '+dl.water+'/8 | Cal: '+dl.calories+'/'+def+' | Steps: '+dl.steps+'/10000 | Sleep: '+dl.sleep+'hrs | Exercise: '+dl.exercise+'cal\n';
    if(fl.length>0){c+='\n## FOOD LOG\n';fl.forEach(function(f,i){c+=(i+1)+'. '+f.name+' '+f.calories+'cal\n'})}
    if(phase)c+='\n## PHASE\n'+phase.name+': '+phase.focus+'\n';
    if(meas&&(meas.waist||meas.chest))c+='\n## MEASUREMENTS\nWaist:'+nn(meas.waist,'?')+'cm Chest:'+nn(meas.chest,'?')+'cm\n';
    if(notes)c+='\n## NOTES\n'+notes+'\n';
    return c;
  },
  sysPrompt:function(ctx){
    return 'You are Blaze, an elite AI weight loss coach in the SHED app. Warm, direct, evidence-based, deeply personal.\n\n'+
    'PHILOSOPHY: Weight loss is a system. Celebrate small wins. Never shame. Be specific. Reference their data.\n\n'+
    'KNOWLEDGE: Singapore food (hawker, kopitiam, zi char, nasi lemak, chicken rice, laksa, prata, mala, bubble tea). Accurate SG calorie estimates. CICO, macros, behavioral psychology.\n\n'+

    'End response with JSON on its own line:\n'+

    'Only include mentioned fields. Put |||LOG||| AFTER your chat response.\n'+
    'If no loggable data, just respond normally without any LOG block.\n\n'+
    'STYLE: 2-5 sentences. Name sometimes. ONE action item. SG food swaps. Emojis sparingly.\n\n'+
    'DATA:\n'+ctx;

/* SHED SCORE */
function calcScore(dl,fl,logDays){
  var s=0;
  s+=Math.min(20,Math.round(dl.water*2.5));
  s+=Math.min(20,fl.length*7);
  if(dl.calories>=1200&&dl.calories<=2200)s+=15;else if(dl.calories>0)s+=5;
  s+=Math.min(15,Math.round((dl.steps/10000)*15));
  if(dl.sleep>=7&&dl.sleep<=9)s+=15;else if(dl.sleep>=5)s+=8;
  if(dl.exercise>0)s+=10;
  var yday=new Date();yday.setDate(yday.getDate()-1);
  if(logDays&&logDays[D.key(yday)])s+=5;
  return Math.min(100,s);
}

}

}

    React.createElement('div',{style:{position:'absolute',inset:0,background:'rgba(0,0,0,.6)'},onClick:props.onClose}),
    React.createElement('div',{style:{position:'relative',width:'100%',maxWidth:480,background:'var(--s)',borderRadius:'24px 24px 0 0',padding:'24px 20px 36px',animation:'fu .3s',maxHeight:'85vh',overflowY:'auto'},className:'ns'},
      React.createElement('div',{style:{width:36,height:4,borderRadius:2,background:'rgba(255,255,255,.12)',margin:'0 auto 16px'}}),
      React.createElement('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}},
        props.title&&React.createElement('h3',{style:{fontSize:17,fontWeight:700}},props.title),

/* MAIN APP */
function App(){
  var hasProf=DB.g('pro',null)&&DB.g('pro',{}).name;

  var _ob=useState(0),ob=_ob[0],setOb=_ob[1];

  var _wh=useState(function(){return DB.g('wh',[])}),wh=_wh[0],setWh=_wh[1];
  var _dl=useState(function(){var t=D.today(),s=DB.g('dl',null);return s&&s._d===t?s:{water:0,calories:0,steps:0,sleep:0,exercise:0,_d:t}}),dl=_dl[0],setDl=_dl[1];
  var _fl=useState(function(){return DB.g('fl_'+D.today(),[])}),fl=_fl[0],setFl=_fl[1];
  var _meas=useState(function(){return DB.g('meas',{waist:'',chest:'',hips:'',arms:'',thighs:''})}),meas=_meas[0],setMeas=_meas[1];
  var _logDays=useState(function(){return DB.g('logDays',{})}),logDays=_logDays[0],setLogDays=_logDays[1];

  var _notes=useState(function(){return DB.g('notes_'+D.today(),'')}),notes=_notes[0],setNotes=_notes[1];

  var _phase=useState(function(){return DB.g('phase',{name:'Phase 1: Build the Habit',week:1,focus:'Log daily, hit 6 glasses water, walk 5000 steps'})}),phase=_phase[0],setPhase=_phase[1];

  /* Parse talk-to-log data */
  function parseLog(text){
    var li=text.indexOf('|||LOG|||');

    if(li===-1||ei===-1)return{chat:text,log:null};
    var chat=text.substring(0,li).trim();
