/* ─── SHED SCORE CALCULATOR ─── */
function calcScore(dl,fl,wh,todayKey,logDays){
  var s=0;
  // Water (max 20): 2.5 per glass up to 8
  s+=Math.min(20,Math.round(dl.water*2.5));
  // Food logged (max 20): 7 per meal logged up to 3
  s+=Math.min(20,fl.length*7);
  // Calories in range (max 15): 15 if between 1200-2200
  if(dl.calories>=1200&&dl.calories<=2200)s+=15;
  else if(dl.calories>0)s+=5;
  // Steps (max 15): proportional to 10k
  s+=Math.min(15,Math.round((dl.steps/10000)*15));
  // Sleep (max 15): 15 if 7-9hrs
  if(dl.sleep>=7&&dl.sleep<=9)s+=15;
  else if(dl.sleep>=5)s+=8;
  // Exercise (max 10): any exercise logged
  if(dl.exercise>0)s+=10;
  // Consistency bonus (max 5): logged yesterday too
  var yday=new Date();yday.setDate(yday.getDate()-1);
  if(logDays&&logDays[D.key(yday)])s+=5;
  return Math.min(100,s);
}
